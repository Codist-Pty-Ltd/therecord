# ---------------------------------------------------------------------------
# The Record — continuous integration
# Runs on every pull request and on pushes to main (deploy is separate).
# ---------------------------------------------------------------------------

name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all packages
        run: npx turbo run typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint all packages
        run: npx turbo run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  api-unit-test:
    name: api-unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API dependencies
        run: npx turbo run build --filter=@therecord/api...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Run Vitest unit and e2e tests
        run: npx turbo run test --filter=@therecord/api
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  api-smoke-test:
    name: api-smoke-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_USER: therecord_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: therecord_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U therecord_test -d therecord_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://therecord_test:testpass@localhost:5432/therecord_test
      NODE_ENV: test
      INGESTION_API_KEY: ci-smoke-ingestion-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npx turbo run build --filter=@therecord/api
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Run database migrations
        run: npm run migration:run --workspace=apps/api

      - name: Start API
        run: |
          set -e
          cd apps/api
          export NODE_ENV=test
          export PORT=3091
          export INTELLIGENCE_URL=http://127.0.0.1:8001
          nohup node dist/main.js > /tmp/therecord-api.log 2>&1 &
          echo $! > /tmp/therecord-api.pid
          sleep 8

      - name: Wait for health
        run: |
          if ! curl -fsS --retry 25 --retry-delay 2 --retry-connrefused \
            http://127.0.0.1:3091/api/health; then
            echo "--- API failed to start; last 120 lines of log ---"
            tail -120 /tmp/therecord-api.log || true
            exit 1
          fi

      - name: Run smoke tests
        run: npm run test:smoke --workspace=apps/api

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/therecord-api.pid ]; then
            kill "$(cat /tmp/therecord-api.pid)" 2>/dev/null || true
          fi

  intelligence-lint:
    name: intelligence-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff and mypy
        run: pip install ruff mypy --break-system-packages

      - name: Install intelligence test deps
        run: pip install -r apps/intelligence/requirements-dev.txt --break-system-packages

      - name: Ruff
        run: (cd apps/intelligence && ruff check .)

      - name: Mypy
        run: (cd apps/intelligence && mypy . --ignore-missing-imports)

      - name: Pytest
        run: (cd apps/intelligence && pytest -q)

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_USER: therecord_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: therecord_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U therecord_test -d therecord_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://therecord_test:testpass@localhost:5432/therecord_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API (for SSG data fetches)
        run: npx turbo run build --filter=@therecord/api...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Run database migrations
        run: npm run migration:run --workspace=apps/api

      - name: Start API for SSG
        run: |
          set -e
          cd apps/api
          export NODE_ENV=test
          export PORT=3091
          export INGESTION_API_KEY=ci-build-placeholder
          export INTELLIGENCE_URL=http://127.0.0.1:8001
          nohup node dist/main.js > /tmp/ci-next-build-api.log 2>&1 &
          echo $! > /tmp/ci-next-build-api.pid
          sleep 8

      - name: Wait for API
        run: |
          if ! curl -fsS --retry 25 --retry-delay 2 --retry-connrefused \
            http://127.0.0.1:3091/api/health; then
            echo "--- API failed to start; last 120 lines of log ---"
            tail -120 /tmp/ci-next-build-api.log || true
            exit 1
          fi

      - name: Build web
        env:
          API_URL: http://127.0.0.1:3091
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3091
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx turbo run build --filter=@therecord/web

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/ci-next-build-api.pid ]; then
            kill "$(cat /tmp/ci-next-build-api.pid)" 2>/dev/null || true
          fi
