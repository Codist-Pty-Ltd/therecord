# ---------------------------------------------------------------------------
# The Record — Production deploy
# Pushes to main trigger an SSH deploy to the Hetzner VPS (65.109.7.45).
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   SERVER_HOST     = 65.109.7.45
#   SERVER_USER     = therecord
#   SERVER_SSH_KEY  = full contents of the ed25519 private key used to SSH
#                     *into* the VPS (NOT the therecord_deploy key, which
#                     lives on the server and is used to git pull from GitHub)
#   APP_DIR         = /opt/therecord
#
# Post-migrate seeds (idempotent): impact-sectors → sa-history → state-entities.
# Post-migrate intelligence: index_corpus (embeds stories/commissions/SIU into doc_chunk).
# Full corpus refresh (mkhwanazi, new-stories-2026, accountability-bodies) still
# requires `npm run seed:all` on the VPS when editorial seeds change — see RUNBOOK.md.
#
# Server prerequisites (one-time, outside this workflow):
#   - /opt/therecord is a git clone of this repo, owned by user `therecord`.
#   - ~/.ssh/therecord_deploy is an ed25519 deploy key whose public half is
#     registered on this GitHub repo as a deploy key with read access.
#   - docker + docker compose v2 are installed and the `therecord` user is
#     in the `docker` group.
# ---------------------------------------------------------------------------

name: Deploy to Hetzner

on:
  push:
    branches:
      - main

# Prevent overlapping deploys. Queued runs wait for the current one to
# finish rather than running in parallel (which would race on the server).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build and test (Turborepo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo run build --filter=!@therecord/web
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Run all tests
        run: npx turbo run test
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  deploy:
    name: Deploy to production VPS
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Show deployment context
        run: |
          echo "Commit   : ${GITHUB_SHA}"
          echo "Actor    : ${GITHUB_ACTOR}"
          echo "Ref      : ${GITHUB_REF}"
          echo "Target   : ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.APP_DIR }}"
          echo "Message  : ${{ github.event.head_commit.message }}"

      - name: Pull, build, wait, migrate, and prune
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}/app"
            GIT_SSH_COMMAND="ssh -i ~/.ssh/therecord_deploy" git pull origin main
            echo "--- latest commit on server ---"
            git log -1 --oneline
            export NEXT_PUBLIC_BUILD_SHA="$(git rev-parse HEAD)"
            export NEXT_PUBLIC_BUILD_DATE="$(git log -1 --format=%cI)"
            export NEXT_PUBLIC_BUILD_MESSAGE="$(git log -1 --format=%s)"
            # Core stack only. Umami is optional — start manually when UMAMI_* are in .env:
            #   docker compose --profile analytics up -d umami umami-db
            if ! docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build; then
              echo "--- compose build/up failed — api logs ---"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs api --tail=80 || true
              echo "--- intelligence logs ---"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs intelligence --tail=40 || true
              exit 1
            fi
            # Fail fast if intelligence image is stale (missing RAG deps).
            docker exec therecord-intelligence python -c \
              "import fastembed, psycopg, pgvector; print('intelligence deps ok')"
            # Run migrations (env vars already in container from compose)
            docker exec therecord-api node dist/database/run-migrations.js
            docker exec therecord-intelligence python -m jobs.index_corpus
            docker exec therecord-api node dist/database/seeds/impact-sectors.seed.js
            docker exec therecord-api node dist/database/seeds/sa-history.seed.js
            docker exec therecord-api node dist/database/seeds/state-entities.seed.js
            # Wait for API container to be ready
            for i in $(seq 1 10); do
              if docker exec therecord-api node -e "process.exit(0)" 2>/dev/null; then
                echo "API container ready"
                break
              fi
              echo "Waiting... attempt $i"
              sleep 3
            done
            # Health check via HTTP (nginx → api on host 3090)
            http_code=$(curl --retry 10 --retry-delay 3 --retry-connrefused \
              --silent --output /tmp/health.json --write-out "%{http_code}" \
              http://127.0.0.1:3090/api/health)
            echo "Health HTTP status: ${http_code}"
            cat /tmp/health.json || true
            test "${http_code}" = "200"
            docker image prune -f

      - name: Notify deployment success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${TELEGRAM_BOT_TOKEN}" ] && [ -n "${TELEGRAM_CHAT_ID}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=✅ The Record deployed: ${{ github.event.head_commit.message }} (${GITHUB_SHA:0:7})" \
              || true
          fi

      - name: Show running containers
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: false
          script: |
            cd "${{ secrets.APP_DIR }}/app"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
